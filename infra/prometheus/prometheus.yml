global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: local
    platform: wms

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/alert-rules.yml

# wms services scraped from the host (Spring Boot Actuator /actuator/prometheus).
# Port assignments align with projects/wms-platform/apps/*/application.yml.
scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'gateway-service'
    metrics_path: /actuator/prometheus
    scrape_interval: 15s
    static_configs:
      - targets: ['host.docker.internal:8080']
        labels:
          service: gateway-service

  - job_name: 'master-service'
    metrics_path: /actuator/prometheus
    scrape_interval: 15s
    static_configs:
      - targets: ['host.docker.internal:8081']
        labels:
          service: master-service

  - job_name: 'inbound-service'
    metrics_path: /actuator/prometheus
    scrape_interval: 15s
    static_configs:
      - targets: ['host.docker.internal:8082']
        labels:
          service: inbound-service

  - job_name: 'inventory-service'
    metrics_path: /actuator/prometheus
    scrape_interval: 15s
    static_configs:
      - targets: ['host.docker.internal:8083']
        labels:
          service: inventory-service

  - job_name: 'outbound-service'
    metrics_path: /actuator/prometheus
    scrape_interval: 15s
    static_configs:
      - targets: ['host.docker.internal:8084']
        labels:
          service: outbound-service

  - job_name: 'notification-service'
    metrics_path: /actuator/prometheus
    scrape_interval: 15s
    static_configs:
      - targets: ['host.docker.internal:8085']
        labels:
          service: notification-service

  - job_name: 'admin-service'
    metrics_path: /actuator/prometheus
    scrape_interval: 15s
    static_configs:
      - targets: ['host.docker.internal:8086']
        labels:
          service: admin-service
