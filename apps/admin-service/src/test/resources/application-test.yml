# Test profile — picked up by integration tests via @ActiveProfiles("test").
#
# Per-class consumer group via ${random.uuid} prevents cross-class offset
# leak when Spring contexts get re-created between test classes
# (TASK-MONO-046-3 SCM/security-service learning). BE-045 has no consumers
# but the group-id is reserved for BE-046.

spring:
  kafka:
    consumer:
      group-id: admin-projection-it-${random.uuid}

  jpa:
    hibernate:
      ddl-auto: validate

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics

admin:
  outbox:
    # Faster polling under test so awaitility doesn't time out.
    polling-interval-ms: 200
    initial-delay-ms: 200
