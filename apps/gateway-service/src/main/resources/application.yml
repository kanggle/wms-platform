spring:
  application:
    name: gateway-service

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s

  # TASK-MONO-019: Standard OAuth2 Resource Server backed by GAP's JWKS.
  security:
    oauth2:
      resourceserver:
        jwt:
          # OIDC issuer for SAS-issued tokens (GAP auth-service).
          issuer-uri: ${OIDC_ISSUER_URL:http://localhost:8081}
          # Default port 8088 avoids a self-referential loop when the gateway
          # binds to 8080 (SERVER_PORT default). Real environments set
          # OIDC_JWK_SET_URI to the issuer's JWKS endpoint. JWT_JWKS_URI is
          # the legacy env var name kept for backward compatibility with the
          # e2e harness.
          jwk-set-uri: ${OIDC_JWK_SET_URI:${JWT_JWKS_URI:${OIDC_ISSUER_URL:http://localhost:8088}/oauth2/jwks}}
          audiences: wms

  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - Authorization
              - Content-Type
              - X-Request-Id
              - Idempotency-Key
            exposedHeaders:
              - X-Request-Id
              - ETag
              - Retry-After
            maxAge: 3600
      httpclient:
        connect-timeout: 2000
        response-timeout: 10s
      routes:
        - id: master-service
          uri: ${MASTER_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/api/v1/master/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@clientIpKeyResolver}"
        # TASK-BE-153: backfill 4 service routes (inbound/inventory/outbound/admin).
        # notification-service is event-consumer (no REST surface) — route omitted.
        # Per specs/services/gateway-service/architecture.md § Routes: standard tier
        # (100 rpm / 200 burst) for inbound/inventory/outbound; admin tier (60/120).
        # Rate-limit bucket is keyed (clientIp, routeId) — admin gets an isolated
        # bucket by virtue of its distinct route id, no separate KeyResolver bean
        # required. See RateLimitConfig#clientIpKeyResolver.
        - id: inbound-service
          uri: ${INBOUND_SERVICE_URI:http://localhost:8082}
          predicates:
            - Path=/api/v1/inbound/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@clientIpKeyResolver}"
        - id: inventory-service
          uri: ${INVENTORY_SERVICE_URI:http://localhost:8083}
          predicates:
            - Path=/api/v1/inventory/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@clientIpKeyResolver}"
        - id: outbound-service
          uri: ${OUTBOUND_SERVICE_URI:http://localhost:8084}
          predicates:
            - Path=/api/v1/outbound/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@clientIpKeyResolver}"
        - id: admin-service
          uri: ${ADMIN_SERVICE_URI:http://localhost:8086}
          predicates:
            - Path=/api/v1/admin/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 60
                redis-rate-limiter.burstCapacity: 120
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@clientIpKeyResolver}"

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  level:
    root: INFO
    com.wms.gateway: INFO
    org.springframework.cloud.gateway: INFO
    org.springframework.web: INFO
  pattern:
    level: "%5p [traceId=%X{traceId:-} requestId=%X{requestId:-}]"

wms:
  # TASK-MONO-019: OIDC Resource Server validators.
  oauth2:
    # Acceptable iss claim values during the D2-b deprecation window.
    allowed-issuers: ${OIDC_ALLOWED_ISSUERS:${OIDC_ISSUER_URL:http://localhost:8081},iam}
    required-tenant-id: ${OIDC_REQUIRED_TENANT_ID:wms}
