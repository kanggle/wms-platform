spring:
  application:
    name: inbound-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/inbound_db}
    username: ${DB_USERNAME:inbound}
    password: ${DB_PASSWORD:inbound}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.time_zone: UTC
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWT_JWKS_URI:http://localhost:8080/.well-known/jwks.json}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:inbound-service}
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        spring.json.trusted.packages: '*'
    listener:
      ack-mode: record
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 2147483647
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5

  threads:
    virtual:
      enabled: true

server:
  port: ${SERVER_PORT:8082}
  forward-headers-strategy: framework
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  level:
    root: INFO
    com.wms.inbound: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
  pattern:
    level: "%5p [traceId=%X{traceId:-} requestId=%X{requestId:-} actorId=%X{actorId:-}]"

inbound:
  idempotency:
    ttl-seconds: 86400
  outbox:
    poll-ms: 1000
    initial-delay-ms: 5000
    batch-size: 100
  webhook:
    erp:
      timestamp-window-seconds: 300
    inbox:
      processor:
        enabled: true
        fixed-delay-ms: 1000
        batch-size: 50
  kafka:
    dlt-suffix: .DLT
    topics:
      master-warehouse: wms.master.warehouse.v1
      master-zone: wms.master.zone.v1
      master-location: wms.master.location.v1
      master-sku: wms.master.sku.v1
      master-lot: wms.master.lot.v1
      master-partner: wms.master.partner.v1
