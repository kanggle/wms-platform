spring:
  application:
    name: master-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/master_db}
    username: ${DB_USERNAME:master}
    password: ${DB_PASSWORD:master}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.time_zone: UTC
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s

  # TASK-MONO-019: Standard OAuth2 Resource Server backed by GAP's JWKS.
  security:
    oauth2:
      resourceserver:
        jwt:
          # OIDC issuer for SAS-issued tokens. Points at GAP's auth-service.
          # The custom JwtDecoder in OAuth2ResourceServerConfig uses the
          # explicit jwk-set-uri below; issuer claim validation is handled
          # by AllowedIssuersValidator (D2-b: legacy issuer also accepted).
          issuer-uri: ${OIDC_ISSUER_URL:http://localhost:8081}
          # Explicit JWKS URI consumed by the custom JwtDecoder bean.
          # Test harnesses (Testcontainers + MockWebServer) override this.
          # JWT_JWKS_URI is the legacy env var name kept for backward
          # compatibility with the existing e2e harness.
          jwk-set-uri: ${OIDC_JWK_SET_URI:${JWT_JWKS_URI:${OIDC_ISSUER_URL:http://localhost:8081}/oauth2/jwks}}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 2147483647
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5

  threads:
    virtual:
      enabled: true

server:
  port: ${SERVER_PORT:8081}
  forward-headers-strategy: framework
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  level:
    root: INFO
    com.wms.master: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
  pattern:
    level: "%5p [traceId=%X{traceId:-} requestId=%X{requestId:-} actorId=%X{actorId:-}]"

outbox:
  polling:
    interval-ms: 500
    batch-size: 100

master:
  idempotency:
    ttl-seconds: 86400

wms:
  # TASK-MONO-019: OIDC Resource Server validators.
  oauth2:
    # Acceptable iss claim values during the D2-b deprecation window.
    # - The first entry is the SAS issuer URL.
    # - The legacy "global-account-platform" string is kept so existing
    #   tokens from POST /api/auth/login continue to validate. Drop after
    #   deprecation.
    allowed-issuers: ${OIDC_ALLOWED_ISSUERS:${OIDC_ISSUER_URL:http://localhost:8081},global-account-platform}
    required-tenant-id: ${OIDC_REQUIRED_TENANT_ID:wms}
  scheduler:
    lot-expiration:
      # Default ON in every profile except integration tests; see
      # application-integration.yml for the test-harness override.
      enabled: true
