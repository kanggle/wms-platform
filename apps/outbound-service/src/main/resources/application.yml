spring:
  application:
    name: outbound-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/outbound_db}
    username: ${DB_USERNAME:outbound}
    password: ${DB_PASSWORD:outbound}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.time_zone: UTC
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s

  # TASK-MONO-019: Standard OAuth2 Resource Server backed by GAP's JWKS.
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OIDC_ISSUER_URL:http://localhost:8081}
          jwk-set-uri: ${OIDC_JWK_SET_URI:${JWT_JWKS_URI:${OIDC_ISSUER_URL:http://localhost:8081}/oauth2/jwks}}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:outbound-service}
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        spring.json.trusted.packages: '*'
    listener:
      ack-mode: record
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 2147483647
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5

  threads:
    virtual:
      enabled: true

server:
  port: ${SERVER_PORT:8084}
  forward-headers-strategy: framework
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  level:
    root: INFO
    com.wms.outbound: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
  pattern:
    level: "%5p [traceId=%X{traceId:-} requestId=%X{requestId:-} actorId=%X{actorId:-}]"

wms:
  # TASK-MONO-019: OIDC Resource Server validators.
  oauth2:
    allowed-issuers: ${OIDC_ALLOWED_ISSUERS:${OIDC_ISSUER_URL:http://localhost:8081},global-account-platform}
    required-tenant-id: ${OIDC_REQUIRED_TENANT_ID:wms}

outbound:
  idempotency:
    ttl-seconds: 86400
  outbox:
    poll-ms: 1000
    initial-delay-ms: 5000
    batch-size: 100
  webhook:
    erp:
      timestamp-window-seconds: 300
    inbox:
      processor:
        enabled: true
        fixed-delay-ms: 1000
        batch-size: 50
  kafka:
    dlt-suffix: .DLT
    topics:
      master-warehouse: wms.master.warehouse.v1
      master-zone: wms.master.zone.v1
      master-location: wms.master.location.v1
      master-sku: wms.master.sku.v1
      master-lot: wms.master.lot.v1
      master-partner: wms.master.partner.v1

  # TASK-BE-049: TMS HTTP client configuration. baseUrl + apiKey are loaded
  # from Secret Manager in prod (per external-integrations.md §6); env vars
  # are the dev fallback.
  tms:
    base-url: ${TMS_BASE_URL:https://tms.example.com/api/v1}
    api-key: ${TMS_API_KEY:}
    connect-timeout-ms: 5000   # I1
    read-timeout-ms: 30000     # I1
    max-connections: 10        # I9 — bulkhead

# TASK-BE-049: Resilience4j wiring for the TMS adapter (per
# external-integrations.md §2.5 / §2.6 / §2.8). Exception types are
# adapter-internal (TmsTransientException / TmsPermanentException) so the
# application / domain layer sees only the translated
# ExternalServiceUnavailableException.
resilience4j:
  circuitbreaker:
    instances:
      tms-client:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 20                                  # I2
        minimumNumberOfCalls: 10
        failureRateThreshold: 50                               # I2 — 50%
        waitDurationInOpenState: 60s                           # I2 — 60s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        registerHealthIndicator: true
        recordExceptions:
          - com.wms.outbound.adapter.out.tms.TmsTransientException
        ignoreExceptions:
          - com.wms.outbound.adapter.out.tms.TmsPermanentException
  retry:
    instances:
      tms-client:
        maxAttempts: 3                                         # I3 — 3 attempts
        waitDuration: 1s                                       # I3 — base 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2.0                      # I3 — 1s/2s/4s
        enableRandomizedWait: true
        randomizedWaitFactor: 0.2                              # I3 — ±200ms jitter
        retryExceptions:
          - com.wms.outbound.adapter.out.tms.TmsTransientException
        ignoreExceptions:
          - com.wms.outbound.adapter.out.tms.TmsPermanentException
          - io.github.resilience4j.circuitbreaker.CallNotPermittedException
  bulkhead:
    instances:
      tms-client:
        maxConcurrentCalls: 10                                 # I9 — matches HTTP pool
        maxWaitDuration: 0                                     # fail-fast on saturation
