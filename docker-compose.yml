# =============================================================================
# WMS Platform — Local Development Infrastructure
# =============================================================================
# Services:
#   postgres     — master_db and future wms databases (see docker/postgres/init.sh)
#   redis        — idempotency store, rate-limit counters (no auth in dev)
#   kafka        — event bus (KRaft, single broker)
#   kafka-init   — creates wms.master.*.v1 topics per the event contract
#   kafka-ui     — broker / topic inspection
#   prometheus   — metrics scrape
#   alertmanager — alert routing
#   loki         — log aggregation
#   promtail     — docker log tailer
#   grafana      — dashboards
#
# Usage:
#   docker compose up -d         — start everything
#   docker compose down -v       — stop + drop volumes (clean slate)
#   docker compose ps            — status
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Postgres 16 — per-service databases for master/inbound/inventory/outbound/admin
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: wms-postgres
    restart: unless-stopped
    ports:
      - "${PORT_PREFIX:-2}5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_ROOT_PASSWORD:-postgres}
      # Service-user passwords consumed by the init script
      MASTER_DB_PASSWORD: ${MASTER_DB_PASSWORD:-master}
      INBOUND_DB_PASSWORD: ${INBOUND_DB_PASSWORD:-inbound}
      INVENTORY_DB_PASSWORD: ${INVENTORY_DB_PASSWORD:-inventory}
      OUTBOUND_DB_PASSWORD: ${OUTBOUND_DB_PASSWORD:-outbound}
      ADMIN_DB_PASSWORD: ${ADMIN_DB_PASSWORD:-admin}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sh:/docker-entrypoint-initdb.d/01-init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - wms-network

  # ---------------------------------------------------------------------------
  # Redis 7 Alpine — no auth in local dev to match application.yml defaults
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: wms-redis
    restart: unless-stopped
    ports:
      - "${PORT_PREFIX:-2}6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - wms-network

  # ---------------------------------------------------------------------------
  # Kafka (KRaft mode — no Zookeeper dependency)
  # ---------------------------------------------------------------------------
  kafka:
    image: apache/kafka:3.7.0
    container_name: wms-kafka
    restart: unless-stopped
    ports:
      - "${PORT_PREFIX:-2}9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094
      CLUSTER_ID: ${KAFKA_KRAFT_CLUSTER_ID:-MkU3OEVBNTcwNTJENDM2Qg}
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9093,CONTROLLER://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:${PORT_PREFIX:-2}9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
      KAFKA_LOG_SEGMENT_BYTES: 104857600
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - wms-network

  # ---------------------------------------------------------------------------
  # Kafka Topic Initializer — creates wms topics idempotently
  # Topic naming follows specs/contracts/events/master-events.md § Topic Layout.
  # Placeholder topics for other services are included so they exist when
  # those services come online.
  # ---------------------------------------------------------------------------
  kafka-init:
    image: apache/kafka:3.7.0
    container_name: wms-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "=== Waiting for Kafka broker ==="
        sleep 5

        KAFKA_BIN="/opt/kafka/bin"
        BOOTSTRAP="kafka:9092"

        MAIN_PARTITIONS=3
        DLQ_PARTITIONS=1
        REPLICATION_FACTOR=1
        MAIN_RETENTION_MS=604800000
        DLQ_RETENTION_MS=2592000000

        TOPICS=(
          "wms.master.warehouse.v1"
          "wms.master.zone.v1"
          "wms.master.location.v1"
          "wms.master.sku.v1"
          "wms.master.partner.v1"
          "wms.master.lot.v1"
          "wms.inbound.asn.v1"
          "wms.inbound.inspection.v1"
          "wms.inbound.putaway.v1"
          "wms.inventory.adjusted.v1"
          "wms.inventory.transferred.v1"
          "wms.inventory.reserved.v1"
          "wms.inventory.released.v1"
          "wms.outbound.order.v1"
          "wms.outbound.picking.v1"
          "wms.outbound.packing.v1"
          "wms.outbound.shipped.v1"
          "wms.alert.low-stock"
          "wms.alert.anomaly-detected"
        )

        create_topic() {
          local topic="$$1" partitions="$$2" retention="$$3"
          $$KAFKA_BIN/kafka-topics.sh --bootstrap-server $$BOOTSTRAP \
            --create --if-not-exists \
            --topic "$$topic" \
            --partitions "$$partitions" \
            --replication-factor $$REPLICATION_FACTOR \
            --config retention.ms="$$retention" \
            --config cleanup.policy=delete \
            && echo "Created: $$topic" \
            || echo "Skipped: $$topic (already exists)"
        }

        echo "=== Creating main topics ==="
        for t in "$${TOPICS[@]}"; do
          create_topic "$$t" $$MAIN_PARTITIONS $$MAIN_RETENTION_MS
        done

        echo "=== Creating DLQ topics ==="
        for t in "$${TOPICS[@]}"; do
          create_topic "$$t.dlq" $$DLQ_PARTITIONS $$DLQ_RETENTION_MS
        done

        echo "=== Topic creation complete ==="
        $$KAFKA_BIN/kafka-topics.sh --bootstrap-server $$BOOTSTRAP --list | sort
        echo "Done."
    restart: "no"
    networks:
      - wms-network

  # ---------------------------------------------------------------------------
  # Kafka UI (provectuslabs/kafka-ui)
  # ---------------------------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: wms-kafka-ui
    restart: unless-stopped
    ports:
      - "${PORT_PREFIX:-2}8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: wms-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - wms-network

  # ---------------------------------------------------------------------------
  # Prometheus — metrics scraping (retention 2 days for local dev)
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: wms-prometheus
    restart: unless-stopped
    ports:
      - "${PORT_PREFIX:-2}9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=2d'
      - '--web.enable-lifecycle'
    volumes:
      - ./infra/prometheus:/etc/prometheus:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - wms-network

  # ---------------------------------------------------------------------------
  # AlertManager — routes Prometheus alerts
  # ---------------------------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: wms-alertmanager
    restart: unless-stopped
    ports:
      - "${PORT_PREFIX:-2}9095:9093"
    volumes:
      - ./infra/alertmanager:/etc/alertmanager:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    networks:
      - wms-network

  # ---------------------------------------------------------------------------
  # Loki — log aggregation (retention ~1 day via compactor)
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:3.1.1
    container_name: wms-loki
    restart: unless-stopped
    ports:
      - "${PORT_PREFIX:-2}3100:3100"
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    networks:
      - wms-network

  # ---------------------------------------------------------------------------
  # Promtail — docker log tailer, ships to Loki
  # ---------------------------------------------------------------------------
  promtail:
    image: grafana/promtail:3.1.1
    container_name: wms-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./infra/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - promtail-positions:/tmp
    depends_on:
      - loki
    networks:
      - wms-network

  # ---------------------------------------------------------------------------
  # Grafana — dashboards (Prometheus + Loki)
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.2.0
    container_name: wms-grafana
    restart: unless-stopped
    ports:
      - "${PORT_PREFIX:-2}3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    networks:
      - wms-network

volumes:
  postgres-data:
  redis-data:
  kafka-data:
  prometheus-data:
  grafana-data:
  loki-data:
  promtail-positions:

networks:
  wms-network:
    driver: bridge
