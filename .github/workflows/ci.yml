  # It runs on schedule cron '0 18 * * *' (UTC 18:00 = KST 03:00) and is
  # triggered manually via workflow_dispatch. TASK-MONO-045.

  e2e-tests:
    name: E2E (gateway-master live-pair, Testcontainers)
    runs-on: ubuntu-latest
    needs: [changes, build-and-test, boot-jars]
    timeout-minutes: 60
    # Scoped to the monorepo-lab dev environment (see integration-tests comment).
    # Activate for wms changes, cross-project (libs/workflows), or any project's
    # contract change (cross-service consumer gate, MONO-074).
    if: >-
      github.repository == 'kanggle/monorepo-lab' &&
      (
        github.event_name == 'push' ||
        needs.changes.outputs.libs == 'true' ||
        needs.changes.outputs.workflows == 'true' ||
        needs.changes.outputs.wms == 'true' ||
        needs.changes.outputs.contracts == 'true'
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Download boot jars
        uses: actions/download-artifact@v4
        with:
          name: wms-boot-jars
          path: artifact-staging

      - name: Restore boot jar paths
        # actions/upload-artifact@v4 strips the longest common prefix when
        # multiple paths are uploaded, so the wms-boot-jars artifact contains
        # `master-service/build/libs/master-service.jar` and
        # `gateway-service/build/libs/gateway-service.jar` (with the
        # `projects/wms-platform/apps/` prefix removed). The e2e harness's
        # locateFile() in E2EBase.java expects the original
        # `apps/<service>/build/libs/<service>.jar` layout when resolving
        # paths from gateway-service's project directory, so move the
        # jars back to their canonical locations before invoking Gradle.
        run: |
          mkdir -p projects/wms-platform/apps/master-service/build/libs/
          mkdir -p projects/wms-platform/apps/gateway-service/build/libs/
          mv artifact-staging/master-service/build/libs/master-service.jar \
             projects/wms-platform/apps/master-service/build/libs/master-service.jar
          mv artifact-staging/gateway-service/build/libs/gateway-service.jar \
             projects/wms-platform/apps/gateway-service/build/libs/gateway-service.jar

      - name: Verify Docker (Testcontainers prerequisite)
        run: docker info

      - name: Build service images for e2e
        # Use the Docker CLI (BuildKit) instead of Testcontainers' ImageFromDockerfile
        # (Docker Java client REST API). On Docker 28 the REST /build endpoint routes
        # through BuildKit's gRPC session mechanism and hangs indefinitely with the
        # Docker Java client bundled in Testcontainers 1.21.3 — 58-min and 60-min
        # diagnostic runs confirmed zero progress after the image-check log line.
        # Pre-building here and passing the image names via -Dwms.e2e.* lets
        # E2EBase.java skip ImageFromDockerfile and use GenericContainer directly.
        run: |
          docker build -t wms-master-service:e2e \
            -f projects/wms-platform/apps/master-service/Dockerfile \
            projects/wms-platform/apps/master-service/
          docker build -t wms-gateway-service:e2e \
            -f projects/wms-platform/apps/gateway-service/Dockerfile \
            projects/wms-platform/apps/gateway-service/

      - name: Run gateway-master e2e suite
        run: >-
          ./gradlew
          :projects:wms-platform:apps:gateway-service:e2eTest
          -x :projects:wms-platform:apps:master-service:bootJar
          -x :projects:wms-platform:apps:gateway-service:bootJar
          -Dwms.e2e.masterImage=wms-master-service:e2e
          -Dwms.e2e.gatewayImage=wms-gateway-service:e2e
          --no-daemon --stacktrace

      - name: Upload e2e test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-reports
          path: |
            projects/wms-platform/apps/gateway-service/build/reports/tests/e2eTest/
            projects/wms-platform/apps/gateway-service/build/test-results/e2eTest/
          retention-days: 7

