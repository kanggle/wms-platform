name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-and-test:
    name: Build & Test (JDK 21, Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify Docker (Testcontainers prerequisite)
        run: docker info

      - name: Build and test
        run: ./gradlew check --no-daemon --stacktrace

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/
          retention-days: 7

  boot-jars:
    name: Package boot jars
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build boot jars
        run: >-
          ./gradlew
          :projects:wms-platform:apps:master-service:bootJar
          :projects:wms-platform:apps:gateway-service:bootJar
          --no-daemon

      - name: Upload jars
        uses: actions/upload-artifact@v4
        with:
          name: wms-boot-jars
          path: |
            projects/wms-platform/apps/master-service/build/libs/master-service.jar
            projects/wms-platform/apps/gateway-service/build/libs/gateway-service.jar
          retention-days: 7

  integration-tests:
    name: Integration (master-service, Testcontainers)
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 20
    # Integration suite boots Postgres + Kafka + Redis via Testcontainers.
    # Mirrors the e2e job's gating: runs only on the monorepo-lab dev
    # environment, skipped in the portfolio extraction (kanggle/wms-platform)
    # whose badge reflects the Docker-free `check` signal. TASK-BE-017.
    if: github.repository == 'kanggle/monorepo-lab'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify Docker (Testcontainers prerequisite)
        run: docker info

      - name: Run master-service integration suite
        run: >-
          ./gradlew
          :projects:wms-platform:apps:master-service:integrationTest
          --no-daemon --stacktrace

      - name: Upload integration test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports
          path: |
            projects/wms-platform/apps/master-service/build/reports/tests/integrationTest/
            projects/wms-platform/apps/master-service/build/test-results/integrationTest/
          retention-days: 7

  e2e-tests:
    name: E2E (gateway-master live-pair, Testcontainers)
    runs-on: ubuntu-latest
    needs: [build-and-test, boot-jars]
    timeout-minutes: 30
    # Scoped to the monorepo-lab dev environment (see integration-tests comment).
    if: github.repository == 'kanggle/monorepo-lab'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Download boot jars
        uses: actions/download-artifact@v4
        with:
          name: wms-boot-jars
          path: .

      - name: Verify Docker (Testcontainers prerequisite)
        run: docker info

      - name: Run gateway-master e2e suite
        run: >-
          ./gradlew
          :projects:wms-platform:apps:gateway-service:e2eTest
          -x :projects:wms-platform:apps:master-service:bootJar
          -x :projects:wms-platform:apps:gateway-service:bootJar
          --no-daemon --stacktrace

      - name: Upload e2e test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-reports
          path: |
            projects/wms-platform/apps/gateway-service/build/reports/tests/e2eTest/
            projects/wms-platform/apps/gateway-service/build/test-results/e2eTest/
          retention-days: 7
