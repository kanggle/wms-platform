    timeout-minutes: 20
    # IAM PR-time smoke job — ADR-MONO-011 § 6.2 (inherited ADR-MONO-010 § 6.2)
    # outstanding closure (TASK-MONO-088). Phase 3 nightly iam-e2e-full 의
    # 7-cycle archaeological inspection (TASK-MONO-080/081/082 + BE-278/279)
    # root cause prevention — ComposeFixture self-managed mode 의 PR-time
    # first-call validation 의무화. iam tests/e2e 모듈이 settings.gradle
    # 미등록이었기에 PR-time CI 의 어떤 job 도 ComposeFixture 호출 안 했고,
    # 7 layer 의 historical 누락이 dev/local-only 가정으로 누적되어 nightly
    # 첫 호출 시 노출되었음. 본 job 이 PR 마다 한 번씩 ComposeFixture 작동
    # 검증.
    #
    # Structure: nightly iam-e2e-full (nightly-e2e.yml L525-599) verbatim +
    # target = :e2eSmokeTest + path-filter gate = fan-platform-e2e pattern.
    # No Docker CLI image build step (ComposeFixture handles via
    # `docker compose up -d --build` in @BeforeAll). No -Pobservability=on
    # (ADR-MONO-007 § D3 CI exclusion 답습).
    if: >-
      github.repository == 'kanggle/monorepo-lab' &&
      (
        github.event_name == 'push' ||
        needs.changes.outputs.libs == 'true' ||
        needs.changes.outputs.workflows == 'true' ||
        needs.changes.outputs.iam == 'true' ||
        needs.changes.outputs.contracts == 'true'
      )

