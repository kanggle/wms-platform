name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ---------------------------------------------------------------------------
  # changes — single source of truth for path-based job filtering.
  #
  # dorny/paths-filter@v3 computes which project areas were touched in this
  # PR / push. Every downstream job reads these outputs via `needs.changes`
  # and applies:
  #
  #   if: needs.changes.outputs.libs == 'true'
  #       || needs.changes.outputs.workflows == 'true'
  #       || needs.changes.outputs.<project> == 'true'
  #
  # Filter rules (path → flag):
  #   libs       libs/ platform/ rules/ .claude/ build.gradle settings.gradle
  #              package.json tsconfig.base.json tasks/templates/
  #              → activates ALL downstream jobs (cross-project impact)
  #   workflows  .github/workflows/
  #              → activates ALL downstream jobs (CI self-change safety)
  #   wms        projects/wms-platform/**
  #   ecommerce  projects/ecommerce-microservices-platform/**
  #   gap        projects/global-account-platform/**
  #   fan        projects/fan-platform/**
  #   scm        projects/scm-platform/**
  #   contracts  projects/*/specs/contracts/**
  #              → force-full e2e: cross-service consumer breakage gate
  #              (single project's contract change → 5 project + frontend smoke
  #              e2e all activate, even if only one project's flag matched).
  #   code-changed  pure-positive enumeration of code-bearing file extensions
  #                 (.java, .ts, .tsx, .gradle, .yaml, .json, .sql, ...).
  #                 markdown-only / docs-only / lifecycle-only PRs do not
  #                 match → false. AND-combined with libs/5-project flags in
  #                 the outputs section so those flags become `false` for
  #                 non-code PRs even when the underlying `paths-filter`
  #                 negation quirk would otherwise mark them true.
  #
  # IMPORTANT — `paths-filter@v3` negation quirk (TASK-MONO-075):
  #   Under the default `predicate-quantifier: 'some'`, a negation pattern
  #   (`!...`) is treated as "file matches iff it does NOT match the inner
  #   glob". For a markdown-only PR, file `tasks/INDEX.md` therefore satisfies
  #   `!projects/wms-platform/**/*.md` (file is NOT under wms-platform) → the
  #   pattern counts as matched → `wms` filter = true even though no positive
  #   matched. This is documented behavior (README: "filters below will match
  #   markdown files despite the exclusion syntax UNLESS you specify 'every'").
  #   Step-level `predicate-quantifier: 'every'` would force all positives in a
  #   filter to AND, breaking the multi-positive `libs` filter — so we instead
  #   AND a pure-positive `code-changed` gate at the outputs layer. The legacy
  #   negation patterns in the 5 project flags are kept as documentation; they
  #   have no operative effect (the outputs-level AND is the real gate).
  #
  # Edge case — workflow self-change PR (.github/workflows/** modified):
  #   The `workflows` flag catches it → all jobs activate (regression safety).
  #
  # Edge case — dorny/paths-filter step itself fails (bug/timeout):
  #   All outputs default to empty string (falsy).  The `if:` conditions below
  #   use `|| github.event_name == 'push'` as a push-to-main fallback so main
  #   branch protection is never compromised by a filter failure.
  #   PR-level filtering simply falls back to "all skip" — the author can
  #   close+reopen the PR to retry or add an empty commit to re-trigger.
  #
  # Edge case — root tasks/** or markdown-only change:
  #   No project flag is true; libs/workflows are also false; contracts is false.
  #   build-and-test activates via its own push-to-main fallback only (skips for
  #   PRs); all other jobs skip. Spec/chore PRs complete in ~1-2 min.
  #   TASK-MONO-045 baseline → TASK-MONO-058 (project tasks/) →
  #   TASK-MONO-074 (markdown-only, contracts force-full).
  #
  # Edge case — contracts-only PR (single project's specs/contracts/** change):
  #   `contracts` flag activates → all 4 e2e jobs (wms e2e-tests +
  #   fan-platform-e2e + scm-platform-e2e + frontend-e2e-smoke) trigger
  #   regardless of which project the contract belongs to.  Catches
  #   cross-service consumer breakage that single-project flag would miss.
  # ---------------------------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    outputs:
      # TASK-MONO-075: dorny/paths-filter@v3 default `predicate-quantifier: 'some'`
      # treats negation patterns (`!...`) as "file is matched if it satisfies the
      # negation" — i.e. a markdown-only PR with no positive match still produces
      # `wms = true` because the `!projects/wms-platform/**/*.md` negation is
      # satisfied (file is NOT under that glob). See ADR-MONO-... or the README
      # quote: "The filters below will match markdown files despite the exclusion
      # syntax UNLESS you specify 'every' as the predicate-quantifier parameter."
      # Step-level `predicate-quantifier: 'every'` is incompatible with our
      # multi-positive `libs` filter (would force all positives to AND).
      #
      # Fix: compose each code-area flag with the `code-changed` positive flag at
      # the outputs layer. `code-changed` is a pure-positive enumeration of code
      # file extensions, so its `'some'` evaluation is intuitive (markdown-only
      # PR → no positive match → flag false). AND-ing the two gates ensures that
      # markdown-only PRs land on `false` for every code-area flag downstream.
      # `workflows` / `contracts` / `observability` already have pure-positive
      # filters and need no compose.
      libs: ${{ steps.filter.outputs.libs == 'true' && steps.filter.outputs.code-changed == 'true' }}
      workflows: ${{ steps.filter.outputs.workflows }}
      wms: ${{ steps.filter.outputs.wms == 'true' && steps.filter.outputs.code-changed == 'true' }}
      ecommerce: ${{ steps.filter.outputs.ecommerce == 'true' && steps.filter.outputs.code-changed == 'true' }}
      gap: ${{ steps.filter.outputs.gap == 'true' && steps.filter.outputs.code-changed == 'true' }}
      fan: ${{ steps.filter.outputs.fan == 'true' && steps.filter.outputs.code-changed == 'true' }}
      scm: ${{ steps.filter.outputs.scm == 'true' && steps.filter.outputs.code-changed == 'true' }}
      contracts: ${{ steps.filter.outputs.contracts }}
      observability: ${{ steps.filter.outputs.observability }}
      code-changed: ${{ steps.filter.outputs.code-changed }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            libs:
              - 'libs/**'
              - 'platform/**'
              - 'rules/**'
              - '.claude/**'
              - 'build.gradle'
              - 'settings.gradle'
              - 'package.json'
              - 'tsconfig.base.json'
              - 'tasks/templates/**'
              - '!**/*.md'
            workflows:
              - '.github/workflows/**'
            wms:
              - 'projects/wms-platform/**'
              - '!projects/wms-platform/tasks/**'
              - '!projects/wms-platform/**/*.md'
            ecommerce:
              - 'projects/ecommerce-microservices-platform/**'
              - '!projects/ecommerce-microservices-platform/tasks/**'
              - '!projects/ecommerce-microservices-platform/**/*.md'
            gap:
              - 'projects/global-account-platform/**'
              - '!projects/global-account-platform/tasks/**'
              - '!projects/global-account-platform/**/*.md'
            fan:
              - 'projects/fan-platform/**'
              - '!projects/fan-platform/tasks/**'
              - '!projects/fan-platform/**/*.md'
            scm:
              - 'projects/scm-platform/**'
              - '!projects/scm-platform/tasks/**'
              - '!projects/scm-platform/**/*.md'
            contracts:
              - 'projects/*/specs/contracts/**'
            observability:
              - 'infra/observability/**'
              - 'scripts/observability/**'
            # TASK-MONO-075: pure-positive enumeration of code-bearing file
            # extensions. `'some'` quantifier behaves intuitively here (no
            # negation → no quirk). markdown-only / docs-only / lifecycle-only
            # PRs do not match any positive → flag = false. AND-combined with
            # each code-area flag in `outputs` above to gate downstream jobs.
            code-changed:
              - '**/*.java'
              - '**/*.kt'
              - '**/*.kts'
              - '**/*.gradle'
              - '**/*.gradle.kts'
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.js'
              - '**/*.jsx'
              - '**/*.mjs'
              - '**/*.cjs'
              - '**/*.yaml'
              - '**/*.yml'
              - '**/*.json'
              - '**/*.xml'
              - '**/*.sql'
              - '**/*.sh'
              - '**/*.ps1'
              - '**/*.properties'
              - '**/*.css'
              - '**/*.scss'
              - '**/*.pem'
              - '**/Dockerfile'
              - '**/Dockerfile.*'
              - '**/.env'
              - '**/.env.*'

  build-and-test:
    name: Build & Test (JDK 21, Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: changes
    # Activate when:
    #   - any shared library / cross-project path changed (libs, workflows)
    #   - any project's backend code changed (wms, ecommerce, gap, fan, scm)
    #   - push to main always runs (safety net regardless of filter)
    # spec/chore PRs (tasks/** or *.md only) produce no matching flag → skip.
    if: >-
      github.event_name == 'push' ||
      needs.changes.outputs.libs == 'true' ||
      needs.changes.outputs.workflows == 'true' ||
      needs.changes.outputs.wms == 'true' ||
      needs.changes.outputs.ecommerce == 'true' ||
      needs.changes.outputs.gap == 'true' ||
      needs.changes.outputs.fan == 'true' ||
      needs.changes.outputs.scm == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify Docker (Testcontainers prerequisite)
        run: docker info

      - name: Build and test (libs + wms-platform + ecommerce backend)
        # Scope rationale:
        # - libs/* and wms-platform/* always run (the wms baseline).
        # - ecommerce-microservices-platform/* run on a per-service basis after
        #   TASK-MONO-004 added @Tag("integration") to Testcontainers-backed
        #   classes and made the default :test task Docker-free.
        # - 11 ecommerce backend services run (auth-service removed by TASK-BE-132).
        # Use :check (not :test) on every entry — matches the wms style, and
        # picks up jacoco / lint where defined.
        run: >-
          ./gradlew
          :libs:java-common:check
          :libs:java-messaging:check
          :libs:java-observability:check
          :libs:java-security:check
          :libs:java-test-support:check
          :libs:java-web:check
          :projects:wms-platform:apps:gateway-service:check
          :projects:wms-platform:apps:inbound-service:check
          :projects:wms-platform:apps:inventory-service:check
          :projects:wms-platform:apps:outbound-service:check
          :projects:wms-platform:apps:master-service:check
          :projects:wms-platform:apps:notification-service:check
          :projects:wms-platform:apps:admin-service:check
          :projects:ecommerce-microservices-platform:apps:batch-worker:check
          :projects:ecommerce-microservices-platform:apps:gateway-service:check
          :projects:ecommerce-microservices-platform:apps:notification-service:check
          :projects:ecommerce-microservices-platform:apps:order-service:check
          :projects:ecommerce-microservices-platform:apps:payment-service:check
          :projects:ecommerce-microservices-platform:apps:product-service:check
          :projects:ecommerce-microservices-platform:apps:promotion-service:check
          :projects:ecommerce-microservices-platform:apps:review-service:check
          :projects:ecommerce-microservices-platform:apps:search-service:check
          :projects:ecommerce-microservices-platform:apps:shipping-service:check
          :projects:ecommerce-microservices-platform:apps:user-service:check
          --no-daemon --stacktrace

      - name: Build and check GAP backend (Docker-free)
        # GAP integration tests carry @Tag("integration") (either directly or
        # via AbstractIntegrationTest base) and are excluded from `:test` /
        # `:check` by `projects/global-account-platform/build.gradle`. They
        # run in the dedicated `gap-integration-tests` job below. This step
        # therefore stays Docker-free.
        run: >-
          ./gradlew
          :projects:global-account-platform:apps:auth-service:check
          :projects:global-account-platform:apps:account-service:check
          :projects:global-account-platform:apps:admin-service:check
          :projects:global-account-platform:apps:community-service:check
          :projects:global-account-platform:apps:gateway-service:check
          :projects:global-account-platform:apps:membership-service:check
          :projects:global-account-platform:apps:security-service:check
          --no-daemon --stacktrace

      - name: Build and check fan-platform backend (Docker-free)
        # fan-platform integration tests carry @Tag("integration"); the e2e
        # module's tests carry @Tag("e2e"). Both are excluded from default
        # :test/:check tasks (see each module's build.gradle). The e2e job
        # below runs them with Docker.
        run: >-
          ./gradlew
          :projects:fan-platform:apps:gateway-service:check
          :projects:fan-platform:apps:community-service:check
          :projects:fan-platform:apps:artist-service:check
          :projects:fan-platform:tests:e2e:check
          --no-daemon --stacktrace

      - name: Build and check scm-platform backend (Docker-free)
        # scm-platform integration tests carry @Tag("integration") and are
        # excluded from default :test/:check tasks (see each module's
        # build.gradle). Docker-backed integrationTest is invoked separately
        # on dev environments / scm-integration-tests job below.
        # TASK-SCM-BE-001: gateway-service
        # TASK-SCM-BE-002: procurement-service
        # TASK-SCM-BE-003: inventory-visibility-service
        run: >-
          ./gradlew
          :projects:scm-platform:apps:gateway-service:check
          :projects:scm-platform:apps:procurement-service:check
          :projects:scm-platform:apps:inventory-visibility-service:check
          --no-daemon --stacktrace

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/
          retention-days: 7

  boot-jars:
    name: Package boot jars
    runs-on: ubuntu-latest
    needs: [changes, build-and-test]
    timeout-minutes: 15
    # Activate for wms changes or cross-project (libs/workflows).
    if: >-
      github.event_name == 'push' ||
      needs.changes.outputs.libs == 'true' ||
      needs.changes.outputs.workflows == 'true' ||
      needs.changes.outputs.wms == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build boot jars
        run: >-
          ./gradlew
          :projects:wms-platform:apps:master-service:bootJar
          :projects:wms-platform:apps:gateway-service:bootJar
          :projects:wms-platform:apps:notification-service:bootJar
          :projects:wms-platform:apps:admin-service:bootJar
          --no-daemon

      - name: Upload jars
        uses: actions/upload-artifact@v4
        with:
          name: wms-boot-jars
          path: |
            projects/wms-platform/apps/master-service/build/libs/master-service.jar
            projects/wms-platform/apps/gateway-service/build/libs/gateway-service.jar
            projects/wms-platform/apps/notification-service/build/libs/notification-service.jar
            projects/wms-platform/apps/admin-service/build/libs/admin-service.jar
          retention-days: 7

  ecommerce-boot-jars:
    name: Package boot jars (ecommerce)
    runs-on: ubuntu-latest
    needs: [changes, build-and-test]
    timeout-minutes: 15
    # Activate for ecommerce changes or cross-project (libs/workflows).
    # Packages all 12 ecommerce backend services and uploads the JARs as an
    # artifact consumed by the nightly-e2e workflow (TASK-MONO-014, TASK-MONO-045).
    if: >-
      github.event_name == 'push' ||
      needs.changes.outputs.libs == 'true' ||
      needs.changes.outputs.workflows == 'true' ||
      needs.changes.outputs.ecommerce == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build ecommerce boot jars
        # auth-service excluded by TASK-BE-132 — decommissioned, not in settings.gradle.
        run: >-
          ./gradlew
          :projects:ecommerce-microservices-platform:apps:batch-worker:bootJar
          :projects:ecommerce-microservices-platform:apps:gateway-service:bootJar
          :projects:ecommerce-microservices-platform:apps:notification-service:bootJar
          :projects:ecommerce-microservices-platform:apps:order-service:bootJar
          :projects:ecommerce-microservices-platform:apps:payment-service:bootJar
          :projects:ecommerce-microservices-platform:apps:product-service:bootJar
          :projects:ecommerce-microservices-platform:apps:promotion-service:bootJar
          :projects:ecommerce-microservices-platform:apps:review-service:bootJar
          :projects:ecommerce-microservices-platform:apps:search-service:bootJar
          :projects:ecommerce-microservices-platform:apps:shipping-service:bootJar
          :projects:ecommerce-microservices-platform:apps:user-service:bootJar
          --no-daemon --stacktrace

      - name: Upload ecommerce boot jars
        uses: actions/upload-artifact@v4
        with:
          name: ecommerce-boot-jars
          # upload-artifact@v4 strips the longest common prefix from multi-path
          # uploads. All 11 paths share `projects/ecommerce-microservices-platform/apps/`
          # so the artifact root contains `<service>/build/libs/<service>.jar`.
          # The frontend-e2e job restores them to their canonical locations.
          # auth-service excluded by TASK-BE-132 — decommissioned.
          path: |
            projects/ecommerce-microservices-platform/apps/batch-worker/build/libs/batch-worker.jar
            projects/ecommerce-microservices-platform/apps/gateway-service/build/libs/gateway-service.jar
            projects/ecommerce-microservices-platform/apps/notification-service/build/libs/notification-service.jar
            projects/ecommerce-microservices-platform/apps/order-service/build/libs/order-service.jar
            projects/ecommerce-microservices-platform/apps/payment-service/build/libs/payment-service.jar
            projects/ecommerce-microservices-platform/apps/product-service/build/libs/product-service.jar
            projects/ecommerce-microservices-platform/apps/promotion-service/build/libs/promotion-service.jar
            projects/ecommerce-microservices-platform/apps/review-service/build/libs/review-service.jar
            projects/ecommerce-microservices-platform/apps/search-service/build/libs/search-service.jar
            projects/ecommerce-microservices-platform/apps/shipping-service/build/libs/shipping-service.jar
            projects/ecommerce-microservices-platform/apps/user-service/build/libs/user-service.jar
          retention-days: 1

  fan-platform-boot-jars:
    name: Package boot jars (fan-platform)
    runs-on: ubuntu-latest
    needs: [changes, build-and-test]
    timeout-minutes: 15
    # Activate for fan-platform changes or cross-project (libs/workflows).
    # Packages the 3 fan-platform v1 backend services (gateway / community /
    # artist) as boot jars and uploads them as a single artifact consumed by
    # the `fan-platform-e2e` job (TASK-FAN-INT-001).
    if: >-
      github.event_name == 'push' ||
      needs.changes.outputs.libs == 'true' ||
      needs.changes.outputs.workflows == 'true' ||
      needs.changes.outputs.fan == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build fan-platform boot jars
        run: >-
          ./gradlew
          :projects:fan-platform:apps:gateway-service:bootJar
          :projects:fan-platform:apps:community-service:bootJar
          :projects:fan-platform:apps:artist-service:bootJar
          --no-daemon --stacktrace

      - name: Upload fan-platform boot jars
        uses: actions/upload-artifact@v4
        with:
          name: fan-platform-boot-jars
          # upload-artifact@v4 strips the longest common prefix
          # (`projects/fan-platform/apps/`) so the artifact root contains
          # `<service>/build/libs/<service>.jar`. The fan-platform-e2e job
          # restores them to their canonical locations.
          path: |
            projects/fan-platform/apps/gateway-service/build/libs/gateway-service.jar
            projects/fan-platform/apps/community-service/build/libs/community-service.jar
            projects/fan-platform/apps/artist-service/build/libs/artist-service.jar
          retention-days: 1

  scm-platform-boot-jars:
    name: Package boot jars (scm-platform)
    runs-on: ubuntu-latest
    needs: [changes, build-and-test]
    timeout-minutes: 15
    # Activate for scm-platform changes or cross-project (libs/workflows).
    # Packages the 3 scm-platform v1 backend services (gateway / procurement /
    # inventory-visibility) as boot jars and uploads them as a single artifact
    # consumed by the `scm-platform-e2e` job (TASK-SCM-INT-001).
    if: >-
      github.event_name == 'push' ||
      needs.changes.outputs.libs == 'true' ||
      needs.changes.outputs.workflows == 'true' ||
      needs.changes.outputs.scm == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build scm-platform boot jars
        run: >-
          ./gradlew
          :projects:scm-platform:apps:gateway-service:bootJar
          :projects:scm-platform:apps:procurement-service:bootJar
          :projects:scm-platform:apps:inventory-visibility-service:bootJar
          --no-daemon --stacktrace

      - name: Upload scm-platform boot jars
        uses: actions/upload-artifact@v4
        with:
          name: scm-platform-boot-jars
          # upload-artifact@v4 strips the longest common prefix
          # (`projects/scm-platform/apps/`) so the artifact root contains
          # `<service>/build/libs/<service>.jar`. The scm-platform-e2e job
          # restores them to their canonical locations.
          path: |
            projects/scm-platform/apps/gateway-service/build/libs/gateway-service.jar
            projects/scm-platform/apps/procurement-service/build/libs/procurement-service.jar
            projects/scm-platform/apps/inventory-visibility-service/build/libs/inventory-visibility-service.jar
          retention-days: 1

  frontend-unit-tests:
    name: Frontend unit tests (ecommerce + fan-platform, vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    # Activate for ecommerce or fan-platform frontend changes, or cross-project.
    if: >-
      github.event_name == 'push' ||
      needs.changes.outputs.libs == 'true' ||
      needs.changes.outputs.workflows == 'true' ||
      needs.changes.outputs.ecommerce == 'true' ||
      needs.changes.outputs.fan == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9.15.0'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: |
            projects/ecommerce-microservices-platform/pnpm-lock.yaml
            projects/fan-platform/pnpm-lock.yaml

      - name: Install dependencies (ecommerce)
        working-directory: projects/ecommerce-microservices-platform
        run: pnpm install --frozen-lockfile

      - name: Run unit tests (ecommerce)
        working-directory: projects/ecommerce-microservices-platform
        run: pnpm test

      - name: Install dependencies (fan-platform)
        working-directory: projects/fan-platform
        # No lockfile checked in yet — TASK-FAN-FE-001 only adds the workspace
        # skeleton. Allow non-frozen install to bootstrap the lockfile.
        run: pnpm install --no-frozen-lockfile

      - name: Run unit tests (fan-platform)
        working-directory: projects/fan-platform
        run: pnpm test

  frontend-e2e-smoke:
    name: Frontend E2E smoke (web-store + fan-platform-web, Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: changes
    # Frontend CI Phase 3 (TASK-MONO-013) extended for fan-platform-web
    # (TASK-FAN-FE-001).
    # Smoke-level E2E only — both apps' playwright.smoke.config.ts force SSR
    # fetch / OIDC discovery to a closed loopback host so each page exercises
    # its fallback path / middleware redirect. No backend stack needed; runs
    # in extracted portfolio repos as well as monorepo-lab.
    # Activate for ecommerce or fan-platform frontend changes, cross-project,
    # or any project's contract change (cross-service consumer gate, MONO-074).
    if: >-
      github.event_name == 'push' ||
      needs.changes.outputs.libs == 'true' ||
      needs.changes.outputs.workflows == 'true' ||
      needs.changes.outputs.ecommerce == 'true' ||
      needs.changes.outputs.fan == 'true' ||
      needs.changes.outputs.contracts == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9.15.0'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: |
            projects/ecommerce-microservices-platform/pnpm-lock.yaml
            projects/fan-platform/pnpm-lock.yaml

      - name: Install dependencies (ecommerce)
        working-directory: projects/ecommerce-microservices-platform
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers (chromium, with system deps)
        working-directory: projects/ecommerce-microservices-platform
        run: pnpm --filter web-store exec playwright install --with-deps chromium

      - name: Run smoke E2E (ecommerce)
        working-directory: projects/ecommerce-microservices-platform
        run: pnpm e2e:smoke

      - name: Install dependencies (fan-platform)
        working-directory: projects/fan-platform
        run: pnpm install --no-frozen-lockfile

      - name: Build fan-platform-web (Next.js prod build for smoke)
        working-directory: projects/fan-platform
        env:
          # Smoke uses the same closed-loopback URL forced by playwright.smoke.config.ts
          NEXT_PUBLIC_GATEWAY_URL: http://127.0.0.1:1
        run: pnpm --filter fan-platform-web build

      - name: Install Playwright browsers (fan-platform-web)
        working-directory: projects/fan-platform
        run: pnpm --filter fan-platform-web exec playwright install --with-deps chromium

      - name: Run smoke E2E (fan-platform-web)
        working-directory: projects/fan-platform
        run: pnpm e2e:smoke

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-smoke
          path: |
            projects/ecommerce-microservices-platform/apps/web-store/playwright-report-smoke/
            projects/ecommerce-microservices-platform/apps/web-store/test-results-smoke/
            projects/fan-platform/web/fan-platform-web/playwright-report-smoke/
