name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-and-test:
    name: Build & Test (JDK 21, Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify Docker (Testcontainers prerequisite)
        run: docker info

      - name: Build and test
        run: ./gradlew check --no-daemon --stacktrace

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/
          retention-days: 7

  boot-jars:
    name: Package boot jars
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build boot jars
        run: >-
          ./gradlew
          :projects:wms-platform:apps:master-service:bootJar
          :projects:wms-platform:apps:gateway-service:bootJar
          --no-daemon

      - name: Upload jars
        uses: actions/upload-artifact@v4
        with:
          name: wms-boot-jars
          path: |
            projects/wms-platform/apps/master-service/build/libs/master-service.jar
            projects/wms-platform/apps/gateway-service/build/libs/gateway-service.jar
          retention-days: 7

  e2e-tests:
    name: E2E (gateway-master live-pair, Testcontainers)
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify Docker (Testcontainers prerequisite)
        run: docker info

      - name: Run gateway-master e2e suite
        run: >-
          ./gradlew
          :projects:wms-platform:apps:gateway-service:e2eTest
          --no-daemon --stacktrace

      - name: Upload e2e test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-reports
          path: |
            projects/wms-platform/apps/gateway-service/build/reports/tests/e2eTest/
            projects/wms-platform/apps/gateway-service/build/test-results/e2eTest/
          retention-days: 7
