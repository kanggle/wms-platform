name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-and-test:
    name: Build & Test (JDK 21, Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify Docker (Testcontainers prerequisite)
        run: docker info

      - name: Build and test (libs + wms-platform + ecommerce backend)
        # Scope rationale:
        # - libs/* and wms-platform/* always run (the wms baseline).
        # - ecommerce-microservices-platform/* run on a per-service basis after
        #   TASK-MONO-004 added @Tag("integration") to Testcontainers-backed
        #   classes and made the default :test task Docker-free.
        # - All 12 ecommerce backend services run (TASK-MONO-005/006/007
        #   closed the last per-service blockers).
        # Use :check (not :test) on every entry — matches the wms style, and
        # picks up jacoco / lint where defined.
        run: >-
          ./gradlew
          :libs:java-common:check
          :libs:java-messaging:check
          :libs:java-observability:check
          :libs:java-security:check
          :libs:java-test-support:check
          :libs:java-web:check
          :projects:wms-platform:apps:gateway-service:check
          :projects:wms-platform:apps:inbound-service:check
          :projects:wms-platform:apps:inventory-service:check
          :projects:wms-platform:apps:outbound-service:check
          :projects:wms-platform:apps:master-service:check
          :projects:wms-platform:apps:notification-service:check
          :projects:wms-platform:apps:admin-service:check
          :projects:ecommerce-microservices-platform:apps:auth-service:check
          :projects:ecommerce-microservices-platform:apps:batch-worker:check
          :projects:ecommerce-microservices-platform:apps:gateway-service:check
          :projects:ecommerce-microservices-platform:apps:notification-service:check
          :projects:ecommerce-microservices-platform:apps:order-service:check
          :projects:ecommerce-microservices-platform:apps:payment-service:check
          :projects:ecommerce-microservices-platform:apps:product-service:check
          :projects:ecommerce-microservices-platform:apps:promotion-service:check
          :projects:ecommerce-microservices-platform:apps:review-service:check
          :projects:ecommerce-microservices-platform:apps:search-service:check
          :projects:ecommerce-microservices-platform:apps:shipping-service:check
          :projects:ecommerce-microservices-platform:apps:user-service:check
          --no-daemon --stacktrace

      - name: Build and check GAP backend (Docker-free)
        # GAP integration tests carry @Tag("integration") (either directly or
        # via AbstractIntegrationTest base) and are excluded from `:test` /
        # `:check` by `projects/global-account-platform/build.gradle`. They
        # run in the dedicated `gap-integration-tests` job below. This step
        # therefore stays Docker-free.
        run: >-
          ./gradlew
          :projects:global-account-platform:apps:auth-service:check
          :projects:global-account-platform:apps:account-service:check
          :projects:global-account-platform:apps:admin-service:check
          :projects:global-account-platform:apps:community-service:check
          :projects:global-account-platform:apps:gateway-service:check
          :projects:global-account-platform:apps:membership-service:check
          :projects:global-account-platform:apps:security-service:check
          --no-daemon --stacktrace

      - name: Build and check fan-platform backend (Docker-free)
        # fan-platform integration tests carry @Tag("integration"); the e2e
        # module's tests carry @Tag("e2e"). Both are excluded from default
        # :test/:check tasks (see each module's build.gradle). The e2e job
        # below runs them with Docker.
        run: >-
          ./gradlew
          :projects:fan-platform:apps:gateway-service:check
          :projects:fan-platform:apps:community-service:check
          :projects:fan-platform:apps:artist-service:check
          :projects:fan-platform:tests:e2e:check
          --no-daemon --stacktrace

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/
          retention-days: 7

  boot-jars:
    name: Package boot jars
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build boot jars
        run: >-
          ./gradlew
          :projects:wms-platform:apps:master-service:bootJar
          :projects:wms-platform:apps:gateway-service:bootJar
          --no-daemon

      - name: Upload jars
        uses: actions/upload-artifact@v4
        with:
          name: wms-boot-jars
          path: |
            projects/wms-platform/apps/master-service/build/libs/master-service.jar
            projects/wms-platform/apps/gateway-service/build/libs/gateway-service.jar
          retention-days: 7

  ecommerce-boot-jars:
    name: Package boot jars (ecommerce)
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 15
    # Packages all 12 ecommerce backend services and uploads the JARs as an
    # artifact consumed by the frontend-e2e job (TASK-MONO-014). Also catches
    # Spring Boot autoconfig / fat-jar classpath / runtime-dep issues that
    # :check (compile + unit tests) does not surface.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build ecommerce boot jars
        run: >-
          ./gradlew
          :projects:ecommerce-microservices-platform:apps:auth-service:bootJar
          :projects:ecommerce-microservices-platform:apps:batch-worker:bootJar
          :projects:ecommerce-microservices-platform:apps:gateway-service:bootJar
          :projects:ecommerce-microservices-platform:apps:notification-service:bootJar
          :projects:ecommerce-microservices-platform:apps:order-service:bootJar
          :projects:ecommerce-microservices-platform:apps:payment-service:bootJar
          :projects:ecommerce-microservices-platform:apps:product-service:bootJar
          :projects:ecommerce-microservices-platform:apps:promotion-service:bootJar
          :projects:ecommerce-microservices-platform:apps:review-service:bootJar
          :projects:ecommerce-microservices-platform:apps:search-service:bootJar
          :projects:ecommerce-microservices-platform:apps:shipping-service:bootJar
          :projects:ecommerce-microservices-platform:apps:user-service:bootJar
          --no-daemon --stacktrace

      - name: Upload ecommerce boot jars
        uses: actions/upload-artifact@v4
        with:
          name: ecommerce-boot-jars
          # upload-artifact@v4 strips the longest common prefix from multi-path
          # uploads. All 12 paths share `projects/ecommerce-microservices-platform/apps/`
          # so the artifact root contains `<service>/build/libs/<service>.jar`.
          # The frontend-e2e job restores them to their canonical locations.
          path: |
            projects/ecommerce-microservices-platform/apps/auth-service/build/libs/auth-service.jar
            projects/ecommerce-microservices-platform/apps/batch-worker/build/libs/batch-worker.jar
            projects/ecommerce-microservices-platform/apps/gateway-service/build/libs/gateway-service.jar
            projects/ecommerce-microservices-platform/apps/notification-service/build/libs/notification-service.jar
            projects/ecommerce-microservices-platform/apps/order-service/build/libs/order-service.jar
            projects/ecommerce-microservices-platform/apps/payment-service/build/libs/payment-service.jar
            projects/ecommerce-microservices-platform/apps/product-service/build/libs/product-service.jar
            projects/ecommerce-microservices-platform/apps/promotion-service/build/libs/promotion-service.jar
            projects/ecommerce-microservices-platform/apps/review-service/build/libs/review-service.jar
            projects/ecommerce-microservices-platform/apps/search-service/build/libs/search-service.jar
            projects/ecommerce-microservices-platform/apps/shipping-service/build/libs/shipping-service.jar
            projects/ecommerce-microservices-platform/apps/user-service/build/libs/user-service.jar
          retention-days: 1

  fan-platform-boot-jars:
    name: Package boot jars (fan-platform)
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 15
    # Packages the 3 fan-platform v1 backend services (gateway / community /
    # artist) as boot jars and uploads them as a single artifact consumed by
    # the `fan-platform-e2e` job (TASK-FAN-INT-001). Same pattern as
    # `boot-jars` (wms) and `ecommerce-boot-jars`.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build fan-platform boot jars
        run: >-
          ./gradlew
          :projects:fan-platform:apps:gateway-service:bootJar
          :projects:fan-platform:apps:community-service:bootJar
          :projects:fan-platform:apps:artist-service:bootJar
          --no-daemon --stacktrace

      - name: Upload fan-platform boot jars
        uses: actions/upload-artifact@v4
        with:
          name: fan-platform-boot-jars
          # upload-artifact@v4 strips the longest common prefix
          # (`projects/fan-platform/apps/`) so the artifact root contains
          # `<service>/build/libs/<service>.jar`. The fan-platform-e2e job
          # restores them to their canonical locations.
          path: |
            projects/fan-platform/apps/gateway-service/build/libs/gateway-service.jar
            projects/fan-platform/apps/community-service/build/libs/community-service.jar
            projects/fan-platform/apps/artist-service/build/libs/artist-service.jar
          retention-days: 1

  frontend-unit-tests:
    name: Frontend unit tests (ecommerce, vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: projects/ecommerce-microservices-platform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9.15.0'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: projects/ecommerce-microservices-platform/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test

  frontend-e2e-smoke:
    name: Frontend E2E smoke (web-store, Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: projects/ecommerce-microservices-platform
    # Frontend CI Phase 3 (TASK-MONO-013).
    # Smoke-level E2E only — playwright.smoke.config.ts forces SSR fetch to a
    # closed loopback port so each page exercises its fallback path (.catch
    # in server components, useRequireAuth on client). No backend stack
    # needed; runs in extracted portfolio repos as well as monorepo-lab.
    # Full-stack Playwright (kanggle/monorepo-lab only, docker compose) is
    # deferred to a follow-up monorepo task.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9.15.0'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: projects/ecommerce-microservices-platform/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers (chromium, with system deps)
        run: pnpm --filter web-store exec playwright install --with-deps chromium

      - name: Run smoke E2E
        run: pnpm e2e:smoke

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-smoke
          path: |
            projects/ecommerce-microservices-platform/apps/web-store/playwright-report-smoke/
            projects/ecommerce-microservices-platform/apps/web-store/test-results-smoke/
          retention-days: 7

  integration-tests:
    name: Integration (master-service, Testcontainers)
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 20
    # Integration suite boots Postgres + Kafka + Redis via Testcontainers.
    # Mirrors the e2e job's gating: runs only on the monorepo-lab dev
    # environment, skipped in the portfolio extraction (kanggle/wms-platform)
    # whose badge reflects the Docker-free `check` signal. TASK-BE-017.
    if: github.repository == 'kanggle/monorepo-lab'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify Docker (Testcontainers prerequisite)
        run: docker info

      - name: Run master-service integration suite
        run: >-
          ./gradlew
          :projects:wms-platform:apps:master-service:integrationTest
          --no-daemon --stacktrace

      - name: Upload integration test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports
          path: |
            projects/wms-platform/apps/master-service/build/reports/tests/integrationTest/
            projects/wms-platform/apps/master-service/build/test-results/integrationTest/
          retention-days: 7

  gap-integration-tests:
    name: Integration (global-account-platform, Testcontainers)
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 30
    # GAP integration suite boots MySQL + Kafka + (per-service Redis/WireMock)
    # via Testcontainers. Scoped to monorepo-lab; the standalone repo
    # extraction relies on its own Docker-free `check` signal.
    if: github.repository == 'kanggle/monorepo-lab'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify Docker (Testcontainers prerequisite)
        run: docker info

      - name: Run GAP integration suites
        run: >-
          ./gradlew
          :projects:global-account-platform:apps:auth-service:integrationTest
          :projects:global-account-platform:apps:account-service:integrationTest
          :projects:global-account-platform:apps:admin-service:integrationTest
          :projects:global-account-platform:apps:community-service:integrationTest
          :projects:global-account-platform:apps:gateway-service:integrationTest
          :projects:global-account-platform:apps:membership-service:integrationTest
          :projects:global-account-platform:apps:security-service:integrationTest
          --no-daemon --stacktrace

      - name: Upload GAP integration test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gap-integration-test-reports
          path: |
            projects/global-account-platform/apps/*/build/reports/tests/integrationTest/
            projects/global-account-platform/apps/*/build/test-results/integrationTest/
          retention-days: 7

  frontend-checks:
    name: Frontend lint & build (ecommerce)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: projects/ecommerce-microservices-platform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9.15.0'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: projects/ecommerce-microservices-platform/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

  frontend-e2e:
    name: Frontend E2E full-stack (web-store, Playwright + docker compose)
    runs-on: ubuntu-latest
    needs: [ecommerce-boot-jars, frontend-checks]
    timeout-minutes: 60
    # Full-stack Playwright suite: docker compose starts 12 Spring Boot backends
    # + Postgres ×10 + Kafka + Redis + Elasticsearch (Nori) + MinIO; Playwright
    # webServer starts web-store via `pnpm start` pointing at the gateway on
    # localhost:18080 via the docker-compose.ci.yml overlay (TASK-MONO-024).
    # Observability services (Jaeger, Prometheus, AlertManager, Grafana, Loki,
    # Promtail) are excluded to fit within the runner's 7 GB RAM. OTEL
    # exporters in the backend services will log connection errors against the
    # absent Jaeger endpoint; these are non-blocking and do not affect test
    # correctness.
    #
    # CI does NOT start the shared Traefik stack — spinning up Traefik plus
    # all 12 backends + infra exceeds the runner's memory budget. Instead the
    # CI overlay (docker-compose.ci.yml) re-publishes only gateway-service on
    # host port 18080 so the existing webServer/health-probe wiring works
    # without architectural change. Local developers should not use the
    # overlay — `pnpm traefik:up` + http://ecommerce.local/ is the dev path.
    #
    # Scoped to kanggle/monorepo-lab: extracted portfolio repos have no backend
    # stack and the smoke job (frontend-e2e-smoke) covers them instead.
    # TASK-MONO-014, TASK-MONO-024.
    if: github.repository == 'kanggle/monorepo-lab'
    defaults:
      run:
        working-directory: projects/ecommerce-microservices-platform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9.15.0'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: projects/ecommerce-microservices-platform/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download ecommerce boot jars
        uses: actions/download-artifact@v4
        with:
          name: ecommerce-boot-jars
          path: projects/ecommerce-microservices-platform/artifact-staging

      - name: Restore ecommerce boot jar paths
        # upload-artifact@v4 strips the common prefix so the artifact contains
        # `<service>/build/libs/<service>.jar`. Restore to the canonical
        # `apps/<service>/build/libs/<service>.jar` layout that each Dockerfile
        # expects (COPY apps/<service>/build/libs/*.jar app.jar).
        working-directory: ${{ github.workspace }}
        run: |
          services=(auth-service batch-worker gateway-service notification-service \
            order-service payment-service product-service promotion-service \
            review-service search-service shipping-service user-service)
          for svc in "${services[@]}"; do
            mkdir -p "projects/ecommerce-microservices-platform/apps/${svc}/build/libs/"
            mv "projects/ecommerce-microservices-platform/artifact-staging/${svc}/build/libs/${svc}.jar" \
               "projects/ecommerce-microservices-platform/apps/${svc}/build/libs/${svc}.jar"
          done

      - name: Create .env for docker compose
        # Synthetic test values — no real secrets needed.
        # Toss and OAuth keys are placeholders (tests stop before payment/OAuth).
        run: |
          cat << 'EOF' > .env
          JWT_SECRET=ci-e2e-test-secret-key-32-chars-minimum
          AUTH_DB_PASSWORD=ci_auth_pass
          PRODUCT_DB_PASSWORD=ci_product_pass
          ORDER_DB_PASSWORD=ci_order_pass
          PAYMENT_DB_PASSWORD=ci_payment_pass
          USER_DB_PASSWORD=ci_user_pass
          BATCH_DB_PASSWORD=ci_batch_pass
          SHIPPING_DB_PASSWORD=ci_shipping_pass
          REVIEW_DB_PASSWORD=ci_review_pass
          PROMOTION_DB_PASSWORD=ci_promotion_pass
          NOTIFICATION_DB_PASSWORD=ci_notification_pass
          TOSS_PAYMENTS_SECRET_KEY=test_sk_ci_placeholder
          NEXT_PUBLIC_TOSS_CLIENT_KEY=test_ck_ci_placeholder
          MINIO_ROOT_USER=minioadmin
          MINIO_ROOT_PASSWORD=minioadmin
          PRODUCT_IMAGES_BUCKET=firstproject-local-product-images
          GRAFANA_ADMIN_PASSWORD=admin
          CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:3001
          OAUTH_CALLBACK_ALLOWLIST=http://localhost:3000/oauth/callback
          EOF

      - name: Build web-store (Next.js prod build)
        # NEXT_PUBLIC_* vars are baked into the bundle at build time, not runtime.
        # Set the gateway URL here so browser-side API calls reach port 18080.
        env:
          NEXT_PUBLIC_API_URL: http://localhost:18080
        run: pnpm --filter web-store build

      - name: Start docker compose stack (backends + infra, no observability)
        # Apply the CI overlay so gateway-service is published on host
        # port 18080 (the shared Traefik stack is not started in CI).
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up --build -d \
            kafka redis elasticsearch minio minio-init \
            auth-postgres product-postgres order-postgres payment-postgres \
            user-postgres batch-postgres shipping-postgres review-postgres \
            promotion-postgres notification-postgres \
            auth-service product-service search-service user-service \
            order-service payment-service batch-worker shipping-service \
            review-service promotion-service notification-service \
            gateway-service

      - name: Wait for gateway health
        # docker-compose.ci.yml publishes gateway-service on host port 18080.
        # Backends have start_period=360s in compose healthchecks; allow 7 min.
        run: |
          echo "Waiting for gateway-service to be healthy (up to 7 min)..."
          for i in $(seq 1 42); do
            if curl -sf http://localhost:18080/actuator/health > /dev/null 2>&1; then
              echo "Gateway healthy after $((i * 10))s"
              exit 0
            fi
            echo "  attempt $i/42 (${i}0s elapsed), retrying in 10s..."
            sleep 10
          done
          echo "Gateway did not become healthy within 7 minutes"
          docker compose -f docker-compose.yml -f docker-compose.ci.yml logs --tail=50 gateway-service
          exit 1

      - name: Install Playwright browsers (chromium, with system deps)
        run: pnpm --filter web-store exec playwright install --with-deps chromium

      - name: Run full-stack E2E
        run: pnpm --filter web-store run e2e

      - name: Stop docker compose stack
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-fullstack
          path: |
            projects/ecommerce-microservices-platform/apps/web-store/playwright-report/
            projects/ecommerce-microservices-platform/apps/web-store/test-results/
          retention-days: 7

  e2e-tests:
    name: E2E (gateway-master live-pair, Testcontainers)
    runs-on: ubuntu-latest
    needs: [build-and-test, boot-jars]
    timeout-minutes: 60
    # Scoped to the monorepo-lab dev environment (see integration-tests comment).
    if: github.repository == 'kanggle/monorepo-lab'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Download boot jars
        uses: actions/download-artifact@v4
        with:
          name: wms-boot-jars
          path: artifact-staging

      - name: Restore boot jar paths
        # actions/upload-artifact@v4 strips the longest common prefix when
        # multiple paths are uploaded, so the wms-boot-jars artifact contains
        # `master-service/build/libs/master-service.jar` and
        # `gateway-service/build/libs/gateway-service.jar` (with the
        # `projects/wms-platform/apps/` prefix removed). The e2e harness's
        # locateFile() in E2EBase.java expects the original
        # `apps/<service>/build/libs/<service>.jar` layout when resolving
        # paths from gateway-service's project directory, so move the
        # jars back to their canonical locations before invoking Gradle.
        run: |
          mkdir -p projects/wms-platform/apps/master-service/build/libs/
          mkdir -p projects/wms-platform/apps/gateway-service/build/libs/
          mv artifact-staging/master-service/build/libs/master-service.jar \
             projects/wms-platform/apps/master-service/build/libs/master-service.jar
          mv artifact-staging/gateway-service/build/libs/gateway-service.jar \
             projects/wms-platform/apps/gateway-service/build/libs/gateway-service.jar

      - name: Verify Docker (Testcontainers prerequisite)
        run: docker info

      - name: Build service images for e2e
        # Use the Docker CLI (BuildKit) instead of Testcontainers' ImageFromDockerfile
        # (Docker Java client REST API). On Docker 28 the REST /build endpoint routes
        # through BuildKit's gRPC session mechanism and hangs indefinitely with the
        # Docker Java client bundled in Testcontainers 1.21.3 — 58-min and 60-min
        # diagnostic runs confirmed zero progress after the image-check log line.
        # Pre-building here and passing the image names via -Dwms.e2e.* lets
        # E2EBase.java skip ImageFromDockerfile and use GenericContainer directly.
        run: |
          docker build -t wms-master-service:e2e \
            -f projects/wms-platform/apps/master-service/Dockerfile \
            projects/wms-platform/apps/master-service/
          docker build -t wms-gateway-service:e2e \
            -f projects/wms-platform/apps/gateway-service/Dockerfile \
            projects/wms-platform/apps/gateway-service/

      - name: Build service images for e2e
        # Use the Docker CLI (BuildKit) instead of Testcontainers' ImageFromDockerfile
        # (Docker Java client REST API). On Docker 28 the REST /build endpoint routes
        # through BuildKit's gRPC session mechanism and hangs indefinitely with the
        # Docker Java client bundled in Testcontainers 1.21.3 — 58-min and 60-min
        # diagnostic runs confirmed zero progress after the image-check log line.
        # Pre-building here and passing the image names via -Dwms.e2e.* lets
        # E2EBase.java skip ImageFromDockerfile and use GenericContainer directly.
        run: |
          docker build -t wms-master-service:e2e \
            -f projects/wms-platform/apps/master-service/Dockerfile \
            projects/wms-platform/apps/master-service/
          docker build -t wms-gateway-service:e2e \
            -f projects/wms-platform/apps/gateway-service/Dockerfile \
            projects/wms-platform/apps/gateway-service/

      - name: Run gateway-master e2e suite
        run: >-
          ./gradlew
          :projects:wms-platform:apps:gateway-service:e2eTest
          -x :projects:wms-platform:apps:master-service:bootJar
          -x :projects:wms-platform:apps:gateway-service:bootJar
          -Dwms.e2e.masterImage=wms-master-service:e2e
          -Dwms.e2e.gatewayImage=wms-gateway-service:e2e
          --no-daemon --stacktrace

      - name: Upload e2e test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-reports
          path: |
            projects/wms-platform/apps/gateway-service/build/reports/tests/e2eTest/
            projects/wms-platform/apps/gateway-service/build/test-results/e2eTest/
          retention-days: 7

  fan-platform-e2e:
    name: E2E (fan-platform v1 live-trio, Testcontainers)
    runs-on: ubuntu-latest
    needs: [build-and-test, fan-platform-boot-jars]
    timeout-minutes: 20
    # Live-trio e2e suite (TASK-FAN-INT-001): boots gateway-service +
    # community-service + artist-service plus Postgres + Redis + Kafka
    # via Testcontainers and a host-side WireMock JWKS stand-in. Mirrors
    # the wms `e2e-tests` job's pattern: pre-build images via the Docker
    # CLI to dodge the Docker 28 BuildKit gRPC hang in
    # `ImageFromDockerfile`, then pass the image names via -Dfan.e2e.*
    # so FanPlatformE2ETestBase uses GenericContainer directly.
    if: github.repository == 'kanggle/monorepo-lab'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Download fan-platform boot jars
        uses: actions/download-artifact@v4
        with:
          name: fan-platform-boot-jars
          path: artifact-staging-fan

      - name: Restore fan-platform boot jar paths
        # actions/upload-artifact@v4 strips the longest common prefix when
        # multiple paths are uploaded. The fan-platform-boot-jars artifact
        # therefore contains `<service>/build/libs/<service>.jar` (with
        # `projects/fan-platform/apps/` stripped). Move them back to their
        # canonical locations so the gateway/community/artist Dockerfiles
        # COPY the right path during the docker build below, AND so
        # FanPlatformE2ETestBase's locateOptionalJar fallback can resolve
        # them when the dev-path system properties are unset.
        run: |
          mkdir -p projects/fan-platform/apps/gateway-service/build/libs/
          mkdir -p projects/fan-platform/apps/community-service/build/libs/
          mkdir -p projects/fan-platform/apps/artist-service/build/libs/
          mv artifact-staging-fan/gateway-service/build/libs/gateway-service.jar \
             projects/fan-platform/apps/gateway-service/build/libs/gateway-service.jar
          mv artifact-staging-fan/community-service/build/libs/community-service.jar \
             projects/fan-platform/apps/community-service/build/libs/community-service.jar
          mv artifact-staging-fan/artist-service/build/libs/artist-service.jar \
             projects/fan-platform/apps/artist-service/build/libs/artist-service.jar

      - name: Verify Docker (Testcontainers prerequisite)
        run: docker info

      - name: Build fan-platform service images for e2e
        # Docker CLI build (BuildKit) — see wms `e2e-tests` job for the
        # rationale (Docker 28 + Testcontainers ImageFromDockerfile hang).
        run: |
          docker build -t fan-platform-gateway-service:e2e \
            -f projects/fan-platform/apps/gateway-service/Dockerfile \
            projects/fan-platform/apps/gateway-service/
          docker build -t fan-platform-community-service:e2e \
            -f projects/fan-platform/apps/community-service/Dockerfile \
            projects/fan-platform/apps/community-service/
          docker build -t fan-platform-artist-service:e2e \
            -f projects/fan-platform/apps/artist-service/Dockerfile \
            projects/fan-platform/apps/artist-service/

      - name: Run fan-platform live-trio e2e suite
        run: >-
          ./gradlew
          :projects:fan-platform:tests:e2e:e2eTest
          -x :projects:fan-platform:apps:gateway-service:bootJar
          -x :projects:fan-platform:apps:community-service:bootJar
          -x :projects:fan-platform:apps:artist-service:bootJar
          -Dfan.e2e.gatewayImage=fan-platform-gateway-service:e2e
          -Dfan.e2e.communityImage=fan-platform-community-service:e2e
          -Dfan.e2e.artistImage=fan-platform-artist-service:e2e
          --no-daemon --stacktrace

      - name: Upload fan-platform e2e test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fan-platform-e2e-test-reports
          path: |
            projects/fan-platform/tests/e2e/build/reports/tests/e2eTest/
            projects/fan-platform/tests/e2e/build/test-results/e2eTest/
          retention-days: 7
