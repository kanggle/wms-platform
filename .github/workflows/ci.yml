    name: Frontend unit tests (ecommerce + fan-platform + console-web, vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    # Activate for ecommerce / fan-platform / platform-console frontend changes,
    # or cross-project. The `platform-console` output is already AND-combined
    # with `code-changed` (changes job), so a markdown-only platform-console PR
    # stays skipped — no negation pattern needed (MONO-074/075 quirk rule).
    if: >-
      github.event_name == 'push' ||
      needs.changes.outputs.libs == 'true' ||
      needs.changes.outputs.workflows == 'true' ||
      needs.changes.outputs.ecommerce == 'true' ||
      needs.changes.outputs.fan == 'true' ||
      needs.changes.outputs.platform-console == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9.15.0'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: |
            projects/ecommerce-microservices-platform/pnpm-lock.yaml
            projects/fan-platform/pnpm-lock.yaml
            projects/platform-console/apps/console-web/pnpm-lock.yaml

      - name: Install dependencies (ecommerce)
        working-directory: projects/ecommerce-microservices-platform
        run: pnpm install --frozen-lockfile

      - name: Run unit tests (ecommerce)
        working-directory: projects/ecommerce-microservices-platform
        run: pnpm test

      - name: Install dependencies (fan-platform)
        working-directory: projects/fan-platform
        # No lockfile checked in yet — TASK-FAN-FE-001 only adds the workspace
        # skeleton. Allow non-frozen install to bootstrap the lockfile.
        run: pnpm install --no-frozen-lockfile

      - name: Run unit tests (fan-platform)
        working-directory: projects/fan-platform
        run: pnpm test

      - name: Install dependencies (console-web)
        working-directory: projects/platform-console/apps/console-web
        run: pnpm install --frozen-lockfile

      - name: Run unit tests (console-web)
        working-directory: projects/platform-console/apps/console-web
        run: pnpm test

      - name: Typecheck (console-web)
        working-directory: projects/platform-console/apps/console-web
        run: npx tsc --noEmit

      - name: Lint (console-web)
        working-directory: projects/platform-console/apps/console-web
        run: pnpm lint

  frontend-e2e-smoke:
    name: Frontend E2E smoke (web-store + fan-platform-web + console-web, Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: changes
    # Frontend CI Phase 3 (TASK-MONO-013) extended for fan-platform-web
    # (TASK-FAN-FE-001) + platform-console-web (TASK-PC-FE-021).
    # Smoke-level E2E only — all three apps' playwright.smoke.config.ts force
    # SSR fetch / OIDC discovery to a closed loopback host so each page exercises
    # its fallback path / middleware redirect. No backend stack needed; runs
    # in extracted portfolio repos as well as monorepo-lab.
    # Activate for ecommerce / fan-platform / platform-console FE changes,
    # cross-project, or any project's contract change (cross-service consumer
    # gate, MONO-074).
    if: >-
      github.event_name == 'push' ||
      needs.changes.outputs.libs == 'true' ||
      needs.changes.outputs.workflows == 'true' ||
      needs.changes.outputs.ecommerce == 'true' ||
      needs.changes.outputs.fan == 'true' ||
      needs.changes.outputs.platform-console == 'true' ||
      needs.changes.outputs.contracts == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9.15.0'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: |
            projects/ecommerce-microservices-platform/pnpm-lock.yaml
            projects/fan-platform/pnpm-lock.yaml
            projects/platform-console/apps/console-web/pnpm-lock.yaml

      - name: Install dependencies (ecommerce)
        working-directory: projects/ecommerce-microservices-platform
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers (chromium, with system deps)
        working-directory: projects/ecommerce-microservices-platform
        run: pnpm --filter web-store exec playwright install --with-deps chromium

      - name: Run smoke E2E (ecommerce)
        working-directory: projects/ecommerce-microservices-platform
        run: pnpm e2e:smoke

      - name: Install dependencies (fan-platform)
        working-directory: projects/fan-platform
        run: pnpm install --no-frozen-lockfile

      - name: Build fan-platform-web (Next.js prod build for smoke)
        working-directory: projects/fan-platform
        env:
          # Smoke uses the same closed-loopback URL forced by playwright.smoke.config.ts
          NEXT_PUBLIC_GATEWAY_URL: http://127.0.0.1:1
        run: pnpm --filter fan-platform-web build

      - name: Install Playwright browsers (fan-platform-web)
        working-directory: projects/fan-platform
        run: pnpm --filter fan-platform-web exec playwright install --with-deps chromium

      - name: Run smoke E2E (fan-platform-web)
        working-directory: projects/fan-platform
        run: pnpm e2e:smoke

      # TASK-PC-FE-021 — platform-console-web smoke stage. console-web is a
      # standalone pnpm package (no workspace at platform-console root) — install
      # + run happen from `apps/console-web/` directly. The smoke config's
      # closed-loopback env makes OIDC discovery / registry / token-exchange /
      # BFF all fail-fast so root redirect / (console) guard / /login render
      # smoke specs exercise the public-path fallback paths deterministically.
      - name: Install dependencies (platform-console-web)
        working-directory: projects/platform-console/apps/console-web
        run: pnpm install --frozen-lockfile

      - name: Build platform-console-web (Next.js prod build for smoke)
        working-directory: projects/platform-console/apps/console-web
        run: pnpm build

      - name: Install Playwright browsers (platform-console-web)
        working-directory: projects/platform-console/apps/console-web
        run: pnpm exec playwright install --with-deps chromium

      - name: Run smoke E2E (platform-console-web)
        working-directory: projects/platform-console/apps/console-web
        run: pnpm e2e:smoke

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-smoke
          path: |
            projects/ecommerce-microservices-platform/apps/web-store/playwright-report-smoke/
            projects/ecommerce-microservices-platform/apps/web-store/test-results-smoke/
            projects/fan-platform/web/fan-platform-web/playwright-report-smoke/
            projects/fan-platform/web/fan-platform-web/test-results-smoke/
            projects/platform-console/apps/console-web/playwright-report-smoke/
            projects/platform-console/apps/console-web/test-results-smoke/
          retention-days: 7

