name: Federation Hardening E2E (Phase 8 cross-product, nightly)

# TASK-MONO-139 — ADR-MONO-018 D1 (location: root tasks/ + this workflow).
#
# Runs against main HEAD every night at 0 19 * * * UTC (KST 04:00 — 1h after
# nightly-e2e.yml 0 18 * * * UTC to stagger CI resource usage) +
# workflow_dispatch for on-demand diagnosis or release-gate verification.
#
# NOT a push-trigger — cross-product scope nightly regression channel is
# sufficient; every-push cost is prohibitive for a 9+ service stack
# (ADR-MONO-018 D1 explicit decision).
#
# 2 jobs:
#   1. federation-hardening-boot-jars (timeout 25 min): builds 8 boot jars
#      (GAP auth/account/admin + finance-account + wms-master + scm-procurement
#      + erp-masterdata + console-bff). Uploads artifact.
#   2. federation-hardening-e2e-fullstack (timeout 50 min): downloads boot
#      jars, builds console-web, starts phased docker-compose stack (12+ svcs
#      incl. victoriatraces), applies seed SQL, runs 8 Playwright specs
#      (+ observability-trace-tree, TASK-MONO-144), uploads trace artifact.
#
# Phase 8 gate (already satisfied per ADR-018 § 1.1):
#   - ADR-MONO-017 ACCEPTED 2026-05-20 (Phase 7 LIVE)
#   - 5/5 backend domains live (GAP + wms + scm + finance + erp)
#   - console-bff D7 per-domain fan-out attribution baseline ON
#
# HARDSTOP-04 invariant: per-domain producer specs / ADR / console-integration-
# contract.md § 2.4.5/6/7/8 are byte-unchanged. This workflow only calls
# existing producer read endpoints (ADR-018 § 3.3 zero-retrofit sixth confirmation).

on:
  schedule:
    - cron: '0 19 * * *'  # UTC 19:00 = KST 04:00 (1h after nightly-e2e.yml)
  workflow_dispatch:

# Scoped to the monorepo (extracted portfolio repos have no backend stack).
# Enforced per-job via `if: github.repository == 'kanggle/monorepo-lab'`.

concurrency:
  group: federation-hardening-e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ===========================================================================
  # Job 1: Build all 8 boot jars needed for docker-compose stack.
  # Separated from the e2e job so the jar-build step appears clearly in the
  # Actions UI and the artifact is available for re-use / debugging.
  # Pattern: mirrors nightly-e2e.yml platform-console-boot-jars-nightly.
  # ===========================================================================
  federation-hardening-boot-jars:
    name: Package federation hardening e2e boot jars
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: github.repository == 'kanggle/monorepo-lab'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build federation hardening e2e boot jars
        # 8 boot jars: GAP (auth/account/admin) + finance-account + wms-master
        # + scm-procurement + erp-masterdata + console-bff.
        # console-web is a Next.js standalone build (handled in e2e job).
        run: >-
          ./gradlew
          :projects:global-account-platform:apps:auth-service:bootJar
          :projects:global-account-platform:apps:account-service:bootJar
          :projects:global-account-platform:apps:admin-service:bootJar
          :projects:finance-platform:apps:account-service:bootJar
          :projects:wms-platform:apps:master-service:bootJar
          :projects:scm-platform:apps:procurement-service:bootJar
          :projects:erp-platform:apps:masterdata-service:bootJar
          :projects:platform-console:apps:console-bff:bootJar
          --no-daemon --stacktrace

      - name: Upload federation hardening e2e boot jars
        uses: actions/upload-artifact@v4
        with:
          name: federation-hardening-e2e-boot-jars
          # upload-artifact@v4 strips the longest common prefix from multi-path
          # uploads — artifact root becomes <project>/apps/<service>/build/libs/<jar>.
          # The e2e job below restores canonical paths.
          path: |
            projects/global-account-platform/apps/auth-service/build/libs/auth-service.jar
            projects/global-account-platform/apps/account-service/build/libs/account-service.jar
            projects/global-account-platform/apps/admin-service/build/libs/admin-service.jar
            projects/finance-platform/apps/account-service/build/libs/account-service.jar
            projects/wms-platform/apps/master-service/build/libs/master-service.jar
            projects/scm-platform/apps/procurement-service/build/libs/procurement-service.jar
            projects/erp-platform/apps/masterdata-service/build/libs/masterdata-service.jar
            projects/platform-console/apps/console-bff/build/libs/console-bff.jar
          retention-days: 1

  # ===========================================================================
  # Job 2: Full-stack Playwright e2e (11+ services + 7 specs).
  # Pattern: mirrors nightly-e2e.yml platform-console-e2e-fullstack job.
  # ===========================================================================
  federation-hardening-e2e-fullstack:
    name: Federation Hardening E2E full-stack (Playwright + docker compose)
    runs-on: ubuntu-latest
    needs: federation-hardening-boot-jars
    timeout-minutes: 50
    if: github.repository == 'kanggle/monorepo-lab'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9.15.0'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: projects/platform-console/apps/console-web/pnpm-lock.yaml

      - name: Install console-web dependencies
        working-directory: projects/platform-console/apps/console-web
        run: pnpm install --frozen-lockfile

      - name: Install federation-hardening-e2e dependencies
        working-directory: tests/federation-hardening-e2e
        run: pnpm install --frozen-lockfile

      - name: Download federation hardening e2e boot jars
        uses: actions/download-artifact@v4
        with:
          name: federation-hardening-e2e-boot-jars
          path: artifact-staging

      - name: Restore boot jar paths
        # upload-artifact@v4 strips the common prefix so the artifact contains
        # <project>/apps/<service>/build/libs/<jar>. Restore to canonical paths
        # that each Dockerfile expects (COPY <service>/build/libs/*.jar app.jar).
        run: |
          # GAP services
          mkdir -p projects/global-account-platform/apps/auth-service/build/libs/
          mkdir -p projects/global-account-platform/apps/account-service/build/libs/
          mkdir -p projects/global-account-platform/apps/admin-service/build/libs/
          mv artifact-staging/global-account-platform/apps/auth-service/build/libs/auth-service.jar \
             projects/global-account-platform/apps/auth-service/build/libs/auth-service.jar
          mv artifact-staging/global-account-platform/apps/account-service/build/libs/account-service.jar \
             projects/global-account-platform/apps/account-service/build/libs/account-service.jar
          mv artifact-staging/global-account-platform/apps/admin-service/build/libs/admin-service.jar \
             projects/global-account-platform/apps/admin-service/build/libs/admin-service.jar

          # finance-platform
          mkdir -p projects/finance-platform/apps/account-service/build/libs/
          mv artifact-staging/finance-platform/apps/account-service/build/libs/account-service.jar \
             projects/finance-platform/apps/account-service/build/libs/account-service.jar

          # wms-platform
          mkdir -p projects/wms-platform/apps/master-service/build/libs/
          mv artifact-staging/wms-platform/apps/master-service/build/libs/master-service.jar \
             projects/wms-platform/apps/master-service/build/libs/master-service.jar

          # scm-platform
          mkdir -p projects/scm-platform/apps/procurement-service/build/libs/
          mv artifact-staging/scm-platform/apps/procurement-service/build/libs/procurement-service.jar \
             projects/scm-platform/apps/procurement-service/build/libs/procurement-service.jar

          # erp-platform
          mkdir -p projects/erp-platform/apps/masterdata-service/build/libs/
          mv artifact-staging/erp-platform/apps/masterdata-service/build/libs/masterdata-service.jar \
             projects/erp-platform/apps/masterdata-service/build/libs/masterdata-service.jar

          # platform-console
          mkdir -p projects/platform-console/apps/console-bff/build/libs/
          mv artifact-staging/platform-console/apps/console-bff/build/libs/console-bff.jar \
             projects/platform-console/apps/console-bff/build/libs/console-bff.jar

      - name: Build console-web (Next.js standalone production)
        working-directory: projects/platform-console/apps/console-web
        run: pnpm build

      # --- Phase 1: Start GAP core stack ---
      - name: Start docker compose Phase 1 (mysql + redis + kafka + victoriatraces + GAP services)
        working-directory: tests/federation-hardening-e2e/docker
        run: |
          docker compose -f docker-compose.federation-e2e.yml up -d --build \
            mysql redis kafka victoriatraces auth-service account-service admin-service

      - name: Wait for admin-service health (gates phase 1.5 seed.sql)
        # admin-service Flyway depends on account_db / auth_db being ready.
        # start_period=60s + retries=12 * interval=15s ≈ 4 min compose budget.
        # Workflow gives 30 * 10s = 5 min grace.
        working-directory: tests/federation-hardening-e2e/docker
        run: |
          echo "Waiting for admin-service health (up to ~5 min)..."
          for i in $(seq 1 30); do
            if docker compose -f docker-compose.federation-e2e.yml ps admin-service \
                | grep -q "healthy"; then
              echo "admin-service healthy after $((i * 10))s"
              exit 0
            fi
            sleep 10
          done
          echo "admin-service did not become healthy in time"
          docker compose -f docker-compose.federation-e2e.yml logs --tail=50 admin-service
          exit 1

      # --- Phase 1.5: Apply GAP + schema seed ---
      - name: Apply seed.sql (GAP operators + finance_db + erp_db CREATE)
        # Phase 1.5 — runs AFTER admin-service healthy (GAP Flyway done) and
        # BEFORE producer services start. Creates finance_db + erp_db schemas
        # + auth_db.credentials + admin_db.admin_operators / roles.
        working-directory: tests/federation-hardening-e2e/docker
        run: |
          docker compose -f docker-compose.federation-e2e.yml exec -T mysql \
            mysql -uroot -prootpass < ../fixtures/seed.sql

      # --- Phase 2: Start producer services + console ---
      - name: Start docker compose Phase 2 (producers + console-bff + console-web)
        working-directory: tests/federation-hardening-e2e/docker
        run: |
          docker compose -f docker-compose.federation-e2e.yml up -d --build \
            wms-postgres scm-postgres \
            wms-master-service scm-procurement-service finance-account-service erp-masterdata-service \
            console-bff console-web

      - name: Wait for finance-account-service health
        working-directory: tests/federation-hardening-e2e/docker
        run: |
          echo "Waiting for finance-account-service health (up to ~5 min)..."
          for i in $(seq 1 30); do
            if docker compose -f docker-compose.federation-e2e.yml ps finance-account-service \
                | grep -q "healthy"; then
              echo "finance-account-service healthy after $((i * 10))s"
              exit 0
            fi
            sleep 10
          done
          echo "finance-account-service did not become healthy in time"
          docker compose -f docker-compose.federation-e2e.yml logs --tail=50 finance-account-service
          exit 1

      - name: Wait for wms-master-service health
        working-directory: tests/federation-hardening-e2e/docker
        run: |
          echo "Waiting for wms-master-service health (up to ~5 min)..."
          for i in $(seq 1 30); do
            if docker compose -f docker-compose.federation-e2e.yml ps wms-master-service \
                | grep -q "healthy"; then
              echo "wms-master-service healthy after $((i * 10))s"
              exit 0
            fi
            sleep 10
          done
          echo "wms-master-service did not become healthy in time"
          docker compose -f docker-compose.federation-e2e.yml logs --tail=50 wms-master-service
          exit 1

      - name: Wait for scm-procurement-service health
        working-directory: tests/federation-hardening-e2e/docker
        run: |
          echo "Waiting for scm-procurement-service health (up to ~5 min)..."
          for i in $(seq 1 30); do
            if docker compose -f docker-compose.federation-e2e.yml ps scm-procurement-service \
                | grep -q "healthy"; then
              echo "scm-procurement-service healthy after $((i * 10))s"
              exit 0
            fi
            sleep 10
          done
          echo "scm-procurement-service did not become healthy in time"
          docker compose -f docker-compose.federation-e2e.yml logs --tail=50 scm-procurement-service
          exit 1

      - name: Wait for erp-masterdata-service health
        working-directory: tests/federation-hardening-e2e/docker
        run: |
          echo "Waiting for erp-masterdata-service health (up to ~5 min)..."
          for i in $(seq 1 30); do
            if docker compose -f docker-compose.federation-e2e.yml ps erp-masterdata-service \
                | grep -q "healthy"; then
              echo "erp-masterdata-service healthy after $((i * 10))s"
              exit 0
            fi
            sleep 10
          done
          echo "erp-masterdata-service did not become healthy in time"
          docker compose -f docker-compose.federation-e2e.yml logs --tail=50 erp-masterdata-service
          exit 1

      # --- Phase 2.5: Apply per-domain producer seed data ---
      - name: Apply seed-domains.sql (finance + erp test data, post-Flyway)
        # Phase 2.5 — applied AFTER all MySQL-backed producers are healthy
        # (finance-account-service + erp-masterdata-service Flyway complete).
        working-directory: tests/federation-hardening-e2e/docker
        run: |
          docker compose -f docker-compose.federation-e2e.yml exec -T mysql \
            mysql -uroot -prootpass < ../fixtures/seed-domains.sql

      - name: Apply seed-wms.sql (wms warehouse test data, post-Flyway)
        # Applied against wms-postgres (PostgreSQL) after wms-master-service healthy.
        working-directory: tests/federation-hardening-e2e/docker
        run: |
          docker compose -f docker-compose.federation-e2e.yml exec -T wms-postgres \
            psql -U master -d master_db < ../fixtures/seed-wms.sql

      - name: Apply seed-scm.sql (scm purchase order test data, post-Flyway)
        # Applied against scm-postgres (PostgreSQL) after scm-procurement-service healthy.
        working-directory: tests/federation-hardening-e2e/docker
        run: |
          docker compose -f docker-compose.federation-e2e.yml exec -T scm-postgres \
            psql -U scm -d scm_procurement < ../fixtures/seed-scm.sql

      - name: Wait for console-web health
        working-directory: tests/federation-hardening-e2e/docker
        run: |
          echo "Waiting for console-web health (up to ~3 min)..."
          for i in $(seq 1 18); do
            if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "console-web healthy after $((i * 10))s"
              exit 0
            fi
            sleep 10
          done
          echo "console-web did not become healthy in time"
          docker compose -f docker-compose.federation-e2e.yml logs --tail=80 console-web console-bff
          exit 1

      - name: Install Playwright chromium (with system deps)
        working-directory: tests/federation-hardening-e2e
        run: pnpm exec playwright install --with-deps chromium

      # TASK-PC-FE-028 iter 7 pattern — runner /etc/hosts entry for the
      # docker-internal OIDC issuer hostname. Required for browser-side
      # OIDC PKCE flow (auth-service:8081 resolves natively via this entry
      # paired with docker-compose ports: ["8081:8081"]).
      - name: Add auth-service to /etc/hosts (PC-FE-028 iter 7 pattern)
        run: echo "127.0.0.1 auth-service" | sudo tee -a /etc/hosts

      - name: Run Playwright federation hardening e2e (8 specs, Chromium)
        working-directory: tests/federation-hardening-e2e
        env:
          CONSOLE_BASE_URL: http://localhost:3000
          E2E_AUTH_BASE_URL: http://localhost:8081
          E2E_ADMIN_BASE_URL: http://localhost:18085
          E2E_CONSOLE_ORIGIN: http://localhost:3000
          E2E_OIDC_ISSUER_URL: http://auth-service:8081
          E2E_CONSOLE_BFF_URL: http://localhost:18090
          E2E_WMS_BASE_URL: http://localhost:18091
          E2E_SCM_BASE_URL: http://localhost:18092
          E2E_FINANCE_BASE_URL: http://localhost:18086
          E2E_ERP_BASE_URL: http://localhost:18093
          # TASK-MONO-144 — VictoriaTraces Jaeger-compat query API (host port).
          E2E_VICTORIATRACES_URL: http://localhost:10428
        run: pnpm exec playwright test --project=chromium

      - name: Dump docker compose logs on failure
        # 11+ containers × ~70 lines = ~770 lines maximum. --tail=500 provides
        # sufficient boot + first-request coverage without overwhelming the log.
        if: failure()
        working-directory: tests/federation-hardening-e2e/docker
        run: docker compose -f docker-compose.federation-e2e.yml logs --tail=500

      - name: Stop docker compose stack
        if: always()
        working-directory: tests/federation-hardening-e2e/docker
        run: docker compose -f docker-compose.federation-e2e.yml down -v

      - name: Upload Playwright report + trace
        # TASK-MONO-133 pattern — `if: always()` (not `if: failure()`) so
        # successful runs also upload an artifact. Combined with `trace: 'on'`
        # in playwright.config.ts, every run produces inspectable evidence.
        # 7 specs × Chromium trace 'on' can be 200 MB+; retention-days: 7
        # keeps daily artifact count bounded (nightly + dispatch only).
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: federation-hardening-playwright-report-nightly
          path: |
            tests/federation-hardening-e2e/playwright-report/
            tests/federation-hardening-e2e/test-results/
          retention-days: 7
          if-no-files-found: warn
